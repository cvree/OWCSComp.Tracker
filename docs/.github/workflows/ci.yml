# =====================================================================
# OWCS Comp Tracker — CI (offline test suite + packaging gate)
# ---------------------------------------------------------------------
# Runs the full deterministic, network-free test suite plus the
# packaging/reproducibility check on every push and PR. No secrets, no
# VOD download, no external services — everything the suite needs is in
# the repo (layouts, per-source templates, the SQLite milestone DB, the
# public export, and the committed evidence).
# =====================================================================
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# One CI run per ref; cancel superseded runs so pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system + Python dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          python -m pip install --upgrade pip
          pip install --quiet opencv-python-headless numpy

      - name: Packaging / reproducibility check
        run: python pipeline/check_packaging.py

      - name: Regenerate production public export (must stay reproducible)
        run: |
          python pipeline/export_data.py --public
          # The committed public_data.v1.js must match a fresh export
          # (timestamps aside) — fail loudly if the DB and export drift.
          git diff --stat -- assets/data/public_data.v1.js || true

      - name: Offline test suite
        run: |
          fail=0
          for t in pipeline/test_*.py; do
            echo "::group::$t"
            if python "$t"; then
              echo "PASS $t"
            else
              echo "::error::FAIL $t"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Test summary
        if: always()
        run: |
          {
            echo "### CI summary"
            echo ""
            echo "- Suites: $(ls pipeline/test_*.py | wc -l)"
            echo "- Packaging check + public export regeneration + full"
            echo "  offline test suite ran on ubuntu-latest / Python 3.12."
          } >> "$GITHUB_STEP_SUMMARY"
