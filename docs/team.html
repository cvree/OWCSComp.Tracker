<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team — OWCS Comp Tracker</title>
<meta name="description" content="Team profile: verified hero pool, pick and win rates, match history — every number evidence-linked.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=Archivo:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/public.css">
</head>
<body class="pub">
<a class="skip-link" href="#main">Skip to content</a>
<main class="pub-main" id="main">
  <div id="t-crumbs"></div>
  <header class="team-head rv" id="t-head" aria-label="Team header"></header>

  <section class="section" aria-label="Team summary">
    <div class="stat-cards" id="t-cards"></div>
  </section>

  <section class="section" aria-label="Hero pool">
    <h2>Hero pool <span class="h-count" id="t-pool-count"></span></h2>
    <div class="stat-note rv"><span aria-hidden="true">⛨</span>
      <span>Heroes this team has actually fielded in <b>verified comps</b> (reviewed or auto-high only). Portraits are upscaled from real broadcast HUD crops — heroes without a harvested crop show a monogram tile.</span></div>
    <div id="t-pool" style="margin-top:16px"></div>
  </section>

  <section class="section" aria-label="Matches">
    <h2>Matches <span class="h-count" id="t-match-count"></span></h2>
    <div id="t-matches"></div>
  </section>
</main>

<script src="assets/vendor/lenis.min.js" defer></script>
<script src="assets/vendor/gsap.min.js" defer></script>
<script src="assets/vendor/ScrollTrigger.min.js" defer></script>
<script src="assets/vendor/three.min.js" defer></script>
<script src="assets/vendor/vanta.net.min.js" defer></script>
<script src="assets/js/motion.js" defer></script>
<script src="assets/data/public_data.v1.js"></script>
<script src="assets/data/public_fixture.v1.js"></script>
<script src="assets/js/public/core.js"></script>
<script src="assets/js/public/shell.js"></script>
<script src="assets/js/public/stats.js"></script>
<script src="assets/js/public/page-team.js"></script>
</body>
</html>
