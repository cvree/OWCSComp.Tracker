# =====================================================================
# OWCS Comp Tracker — scheduled pipeline
# ---------------------------------------------------------------------
# Chains: init_db → run_batch (capture → detect → map_sync per match)
#         → export_data, then commits data/owcs.sqlite + assets/js/data.js.
# The commit redeploys the static site (GitHub Pages from branch, or
# Cloudflare Pages watching the repo).
#
# $0 by design: public-repo Actions minutes, no server, no secrets
# beyond the default GITHUB_TOKEN.
#
# Before the first useful run you must commit:
#   - layouts/<your-layout>.json  (+ anchor/replay reference crops)
#   - templates/<hero_id>.png      (see pipeline/README.md calibration)
# Until then, runs are graceful no-ops.
# =====================================================================

name: pipeline

# MANUAL ONLY. This capture->detect->export batch pushes commits back to
# the repo and depends on a calibrated layout + templates for the target
# broadcast. It is intentionally NOT on a cron: an unattended scheduled
# run on a fresh clone would try to mutate the committed milestone DB and
# push, and would fail without a matching layout. Run it deliberately via
# "Run workflow" once you have calibrated a layout for pending matches.
on:
  workflow_dispatch:
    inputs:
      layout:
        description: "Calibrated layout json to process with"
        required: false
        default: "layouts/owcs_youtube_2026.json"
      match_id:
        description: "Process only this match id (debugging)"
        required: false
        default: ""
      max_vods:
        description: "Max VODs to process this run"
        required: false
        default: "2"

# Never let two runs touch the DB/repo at once; queue instead of cancel
# so a manual debug run still happens after the scheduled one.
concurrency:
  group: owcs-pipeline
  cancel-in-progress: false

permissions:
  contents: write   # commit the updated DB + data.js

env:
  # Chosen at dispatch time; defaults to the committed starter layout.
  LAYOUT: ${{ github.event.inputs.layout || 'layouts/owcs_youtube_2026.json' }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # hard stop well inside free limits

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install --quiet opencv-python-headless yt-dlp

      - name: Init / migrate database
        run: python3 pipeline/init_db.py   # idempotent: schema + reference seed

      # Future Section-2 hook — uncomment when the results ingest exists:
      # - name: Ingest schedules & results
      #   run: python3 pipeline/ingest.py --region asia

      - name: Apply manual comp corrections
        run: python3 pipeline/apply_corrections.py

      - name: Validate data quality (warnings do not fail the run)
        run: python3 pipeline/validate_data.py || echo "validation reported errors (see log)"

      - name: Run pipeline batch
        run: |
          ARGS="--layout $LAYOUT --max ${{ github.event.inputs.max_vods || '2' }}"
          if [ -n "${{ github.event.inputs.match_id }}" ]; then
            ARGS="$ARGS --match ${{ github.event.inputs.match_id }}"
          fi
          python3 pipeline/run_batch.py $ARGS

      - name: Upload quarantined frames (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quarantine-${{ github.run_id }}
          path: work/*/quarantine/
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit updated data
        run: |
          git config user.name  "owcs-pipeline[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add data/owcs.sqlite assets/js/data.js
          if git diff --cached --quiet; then
            echo "No data changes this run."
            exit 0
          fi
          git commit -m "pipeline: update comps & stats ($(date -u +'%Y-%m-%d %H:%M') UTC)"
          # Tolerate a push that landed between checkout and now
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Run summary
        if: always()
        run: |
          {
            echo "### Pipeline run summary"
            echo ""
            echo "- Matches in DB: $(python3 -c "import sys; sys.path.insert(0,'pipeline'); import db; print(db.connect().execute('SELECT COUNT(*) FROM matches').fetchone()[0])")"
            echo "- Comp snapshots: $(python3 -c "import sys; sys.path.insert(0,'pipeline'); import db; print(db.connect().execute('SELECT COUNT(*) FROM comp_snapshots').fetchone()[0])")"
            echo "- Unassigned snapshots: $(python3 -c "import sys; sys.path.insert(0,'pipeline'); import db; print(db.connect().execute('SELECT COUNT(*) FROM comp_snapshots WHERE map_result_id IS NULL').fetchone()[0])")"
            q=$(find work -type d -name quarantine 2>/dev/null | wc -l)
            echo "- Matches with quarantined frames this run: $q"
          } >> "$GITHUB_STEP_SUMMARY"
