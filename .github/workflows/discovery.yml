# =====================================================================
# OWCS Comp Tracker — hourly discovery (Roadmap Phase B)
# ---------------------------------------------------------------------
# Every hour this workflow runs the FACEIT + official-calendar discovery
# sync. It is SAFE BY DEFAULT:
#
#   * With the registries still disabled (placeholder ids) or no
#     FACEIT_API_KEY secret configured, it only runs a --dry-run health
#     check that writes nothing and opens nothing. This is the shipped
#     state.
#   * Once real championship ids are enabled in config/faceit_competitions.json
#     AND the FACEIT_API_KEY secret is set, it runs a live sync, regenerates
#     the public calendar export, validates it, and opens a DATA-UPDATE
#     pull request ONLY when the validated calendar data actually changes.
#
# Recording/segmentation/CV are NOT part of this workflow — discovery is
# lightweight and never downloads a VOD.
# =====================================================================
name: discovery

on:
  schedule:
    # Hourly at :17 to stay clear of the top-of-hour runner congestion.
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Rolling lookback window (days)"
        required: false
        default: "14"

concurrency:
  group: owcs-discovery
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}
      LOOKBACK: ${{ github.event.inputs.lookback_days || '14' }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Discovery + export are stdlib-only; no opencv/ffmpeg needed here.

      - name: Detect readiness (enabled competitions + secret)
        id: gate
        run: |
          ENABLED=$(python3 - <<'PY'
          import sys; sys.path.insert(0, "pipeline")
          from automation import config as c
          print(len(c.load_competitions()))
          PY
          )
          echo "enabled_competitions=$ENABLED" >> "$GITHUB_OUTPUT"
          if [ -n "$FACEIT_API_KEY" ]; then echo "has_key=true" >> "$GITHUB_OUTPUT"; else echo "has_key=false" >> "$GITHUB_OUTPUT"; fi
          echo "Enabled competitions: $ENABLED ; API key present: $([ -n "$FACEIT_API_KEY" ] && echo yes || echo no)"

      - name: Dry-run health check (always; writes nothing)
        run: |
          python3 pipeline/automation/cli.py sync-all --dry-run --lookback-days "$LOOKBACK"

      - name: Live sync + regenerate public calendar
        id: sync
        if: steps.gate.outputs.enabled_competitions != '0' && steps.gate.outputs.has_key == 'true'
        run: |
          python3 pipeline/automation/cli.py sync-all --lookback-days "$LOOKBACK" --export
          python3 pipeline/automation/cli.py coverage --save || true

      - name: Validate before publishing
        id: validate
        if: steps.sync.conclusion == 'success'
        run: |
          python3 pipeline/check_packaging.py
          python3 pipeline/test_automation_calendar_export.py
          python3 pipeline/test_public_site.py

      - name: Open data-update PR if the calendar changed
        if: steps.validate.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "owcs-discovery[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add assets/js/data.js assets/data/public_data.v1.js data/owcs.sqlite 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No validated calendar changes this run — nothing to publish."
            exit 0
          fi
          BR="auto/discovery-$(date -u +'%Y%m%d-%H%M')"
          git checkout -b "$BR"
          git commit -m "data: discovery calendar update ($(date -u +'%Y-%m-%d %H:%M') UTC)"
          git push origin "$BR"
          gh pr create \
            --title "Discovery calendar update ($(date -u +'%Y-%m-%d %H:%M') UTC)" \
            --body "Automated FACEIT + official-calendar discovery sync. Only validated calendar facts (no compositions). Generated by the hourly discovery workflow." \
            --base "${GITHUB_REF_NAME}" --head "$BR" || echo "PR may already exist."

      - name: Summary
        if: always()
        run: |
          {
            echo "### Discovery run"
            echo ""
            echo "- Enabled competitions: ${{ steps.gate.outputs.enabled_competitions }}"
            echo "- API key present: ${{ steps.gate.outputs.has_key }}"
            echo "- Live sync ran: ${{ steps.sync.conclusion || 'skipped (registries disabled or no key)' }}"
          } >> "$GITHUB_STEP_SUMMARY"
