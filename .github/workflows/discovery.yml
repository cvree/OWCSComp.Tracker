# =====================================================================
# OWCS Comp Tracker — discovery + FACEIT registry ops (Roadmap Phase B)
# ---------------------------------------------------------------------
# Hourly it runs the FACEIT + official-calendar discovery sync. It is
# SAFE BY DEFAULT:
#
#   * With the registries still disabled (placeholder ids) or no
#     FACEIT_API_KEY secret configured, the scheduled run only does a
#     --dry-run health check that writes nothing and opens nothing.
#   * Once real championship ids are enabled in
#     config/faceit_competitions.json AND the FACEIT_API_KEY secret is
#     set, the scheduled run does a live sync, regenerates the public
#     calendar export, validates it, and opens a DATA-UPDATE pull request
#     ONLY when the validated calendar data actually changes.
#
# workflow_dispatch adds READ-ONLY modes that use the FACEIT_API_KEY /
# YOUTUBE_API_KEY secrets but never write to the repo and never download a VOD:
#   mode=candidates       list OW2 championships + organizers to confirm ids
#   mode=verify           verify every ENABLED competition via the FACEIT API
#   mode=verify-channels  verify official YouTube channels via channels.list (C1)
#   mode=calendar-dryrun  rolling FACEIT + calendar discovery dry-run (no writes)
#   mode=broadcast-dryrun rolling YouTube broadcast discovery dry-run (no writes)
#   mode=coverage         rolling completeness report (read-only)
#   mode=dryrun           alias of calendar-dryrun (kept for back-compat)
#   mode=sync             (default) same as the scheduled run
#
# The YouTube key is passed ONLY as a step env from the secret; it is never
# printed, committed, or written into a log or report. SCHEDULED PRODUCTION
# LINKING STAYS DISABLED: the hourly run only does the safe FACEIT dry-run
# health check + (when enabled) the FACEIT calendar sync. Broadcast auto-linking
# is off (config broadcast_auto_link: false) until the first real dry-run is
# reviewed — this workflow never auto-links a broadcast on a schedule.
#
# Recording/segmentation/CV are NOT part of this workflow — discovery is
# lightweight and never downloads a VOD.
# =====================================================================
name: discovery

on:
  schedule:
    # Hourly at :17 to stay clear of the top-of-hour runner congestion.
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "sync | candidates | verify | verify-channels | calendar-dryrun | broadcast-dryrun | coverage"
        required: false
        default: "sync"
      query:
        description: "championship name search (candidates mode)"
        required: false
        default: "OWCS"
      org:
        description: "comma-separated organizer ids to list championships for (candidates mode)"
        required: false
        default: ""
      lookback_days:
        description: "Rolling lookback window (days)"
        required: false
        default: "14"

concurrency:
  group: owcs-discovery
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      MODE: ${{ github.event.inputs.mode || 'sync' }}
      QUERY: ${{ github.event.inputs.query || 'OWCS' }}
      LOOKBACK: ${{ github.event.inputs.lookback_days || '14' }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Discovery + export are stdlib-only; no opencv/ffmpeg needed here.

      - name: Detect readiness (enabled competitions + secret)
        id: gate
        run: |
          read ENABLED CHANNELS <<PY_OUT
          $(python3 - <<'PY'
          import sys; sys.path.insert(0, "pipeline")
          from automation import config as c
          print(len(c.load_competitions()), len(c.load_channels()))
          PY
          )
          PY_OUT
          echo "enabled_competitions=$ENABLED" >> "$GITHUB_OUTPUT"
          echo "enabled_channels=$CHANNELS" >> "$GITHUB_OUTPUT"
          if [ -n "$FACEIT_API_KEY" ]; then echo "has_key=true" >> "$GITHUB_OUTPUT"; else echo "has_key=false" >> "$GITHUB_OUTPUT"; fi
          if [ -n "$YOUTUBE_API_KEY" ]; then echo "has_youtube_key=true" >> "$GITHUB_OUTPUT"; else echo "has_youtube_key=false" >> "$GITHUB_OUTPUT"; fi
          echo "Mode: $MODE ; enabled competitions: $ENABLED ; enabled channels: $CHANNELS ; FACEIT key: $([ -n "$FACEIT_API_KEY" ] && echo yes || echo no) ; YouTube key: $([ -n "$YOUTUBE_API_KEY" ] && echo yes || echo no)"

      # -------- READ-ONLY registry-config modes (no repo writes) ----------
      - name: List candidate championships + organizers (mode=candidates)
        if: github.event.inputs.mode == 'candidates'
        env:
          ORGS: ${{ github.event.inputs.org }}
        run: |
          if [ -z "$FACEIT_API_KEY" ]; then echo "::error::FACEIT_API_KEY not set"; exit 1; fi
          echo "::group::organizers matching 'Overwatch'"
          python3 pipeline/automation/cli.py list-organizers --query "Overwatch" || true
          echo "::endgroup::"
          if [ -n "$ORGS" ]; then
            IFS=',' read -ra OA <<< "$ORGS"
            for O in "${OA[@]}"; do
              echo "::group::organizer $O championships (json, authoritative ids)"
              python3 pipeline/automation/cli.py list-championships --organizer "$O" --json || true
              echo "::endgroup::"
            done
          else
            for Q in "$QUERY" "OWCS 2026" "OWCS 2026 Stage"; do
              echo "::group::championships name~'$Q' (all, json)"
              python3 pipeline/automation/cli.py list-championships --query "$Q" --type all --limit 30 --json || true
              echo "::endgroup::"
            done
          fi
          echo "Confirm the OFFICIAL organizer id, then verify each championship id with mode=verify."

      - name: Verify enabled competitions (mode=verify)
        if: github.event.inputs.mode == 'verify'
        run: |
          if [ -z "$FACEIT_API_KEY" ]; then echo "::error::FACEIT_API_KEY not set"; exit 1; fi
          python3 pipeline/automation/cli.py verify-registry

      - name: Rolling FACEIT + calendar discovery dry-run (mode=calendar-dryrun|dryrun)
        if: github.event.inputs.mode == 'calendar-dryrun' || github.event.inputs.mode == 'dryrun'
        run: |
          if [ -z "$FACEIT_API_KEY" ]; then echo "::error::FACEIT_API_KEY not set"; exit 1; fi
          python3 pipeline/automation/cli.py sync-all --dry-run --lookback-days "$LOOKBACK"
          echo "::group::coverage (read-only)"
          python3 pipeline/automation/cli.py coverage --window "$LOOKBACK" || true
          echo "::endgroup::"

      # -------- Phase C: YouTube broadcast discovery (read-only) ----------
      - name: Verify official YouTube channels (mode=verify-channels)
        if: github.event.inputs.mode == 'verify-channels'
        run: |
          if [ -z "$YOUTUBE_API_KEY" ]; then echo "::error::YOUTUBE_API_KEY not set"; exit 1; fi
          # Resolves each official channel handle -> channelId + uploads playlist
          # (channels.list, 1 unit each). Read-only; the key is never printed.
          python3 pipeline/automation/cli.py verify-channels

      - name: Rolling YouTube broadcast discovery dry-run (mode=broadcast-dryrun)
        if: github.event.inputs.mode == 'broadcast-dryrun'
        run: |
          if [ -z "$YOUTUBE_API_KEY" ]; then echo "::error::YOUTUBE_API_KEY not set"; exit 1; fi
          # Populate scheduled_matches read-only first so there is something to
          # match broadcasts against, then discover broadcasts WITHOUT writing.
          # No VOD is ever downloaded and no broadcast is auto-linked here.
          python3 pipeline/automation/cli.py sync-all --lookback-days "$LOOKBACK" || true
          python3 pipeline/automation/cli.py discover-broadcasts --dry-run --lookback-days "$LOOKBACK"

      - name: Rolling completeness report (mode=coverage)
        if: github.event.inputs.mode == 'coverage'
        run: |
          python3 pipeline/automation/cli.py coverage --window "$LOOKBACK"

      # -------- default/scheduled SYNC path (unchanged, safe) -------------
      - name: Dry-run health check (sync mode; always safe, writes nothing)
        if: env.MODE == 'sync'
        run: |
          python3 pipeline/automation/cli.py sync-all --dry-run --lookback-days "$LOOKBACK"

      - name: Live sync + regenerate public calendar
        id: sync
        if: env.MODE == 'sync' && steps.gate.outputs.enabled_competitions != '0' && steps.gate.outputs.has_key == 'true'
        run: |
          python3 pipeline/automation/cli.py sync-all --lookback-days "$LOOKBACK" --export
          python3 pipeline/automation/cli.py coverage --save || true

      - name: Validate before publishing
        id: validate
        if: steps.sync.conclusion == 'success'
        run: |
          python3 pipeline/check_packaging.py
          python3 pipeline/test_automation_calendar_export.py
          python3 pipeline/test_public_site.py

      - name: Open data-update PR if the calendar changed
        if: steps.validate.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "owcs-discovery[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add assets/js/data.js assets/data/public_data.v1.js data/owcs.sqlite 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No validated calendar changes this run — nothing to publish."
            exit 0
          fi
          BR="auto/discovery-$(date -u +'%Y%m%d-%H%M')"
          git checkout -b "$BR"
          git commit -m "data: discovery calendar update ($(date -u +'%Y-%m-%d %H:%M') UTC)"
          git push origin "$BR"
          gh pr create \
            --title "Discovery calendar update ($(date -u +'%Y-%m-%d %H:%M') UTC)" \
            --body "Automated FACEIT + official-calendar discovery sync. Only validated calendar facts (no compositions). Generated by the hourly discovery workflow." \
            --base "${GITHUB_REF_NAME}" --head "$BR" || echo "PR may already exist."

      - name: Summary
        if: always()
        run: |
          {
            echo "### Discovery run — mode: ${MODE}"
            echo ""
            echo "- Enabled FACEIT competitions: ${{ steps.gate.outputs.enabled_competitions }}"
            echo "- Enabled+verified broadcast channels: ${{ steps.gate.outputs.enabled_channels }}"
            echo "- FACEIT key present: ${{ steps.gate.outputs.has_key }}"
            echo "- YouTube key present: ${{ steps.gate.outputs.has_youtube_key }}"
            echo "- Broadcast auto-linking: disabled on schedule (review-only until first dry-run is approved)"
          } >> "$GITHUB_STEP_SUMMARY"
