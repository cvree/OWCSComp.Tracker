# =====================================================================
# OWCS Comp Tracker — operator automation config (Roadmap Phase A4)
# ---------------------------------------------------------------------
# Single source of truth for the automation worker's tunables. Loaded by
# pipeline/automation/config.py with a dependency-free parser (CI installs
# no PyYAML), so keep this a SIMPLE subset: `key: value` scalars, and one
# level of `-` list items under a key. Comments (`#`) and blank lines OK.
#
# Nothing here records or downloads anything on its own — these are the
# knobs the discovery/coverage layer and (later) the self-hosted recording
# worker read. Changing a value never rewrites history; it only changes how
# future cycles behave.
# =====================================================================

# Rolling backfill window (Phase D). The system guarantees every configured
# professional match completed within this many days has a tracked capture
# state — never a silent gap.
lookback_days: 14

# How far ahead the calendar sync looks for scheduled matches (Phase B).
schedule_horizon_days: 30

# Recording arm/disarm padding around a scheduled broadcast (Phase E). Read
# by the self-hosted worker; the discovery layer only records intent.
recording_pre_roll_minutes: 15
recording_post_roll_minutes: 30

# Private raw-VOD retention after successful extraction (Phase J4). Raw video
# is deleted after this many days; evidence crops and hashes are kept forever.
raw_video_retention_days: 2

# Retry ceilings (Phase J1). The job store stops retrying and moves a job to
# FAILED_PERMANENT once these are exceeded, but the row always stays visible.
max_recording_retries: 5
max_processing_retries: 3
max_discovery_retries: 6

# Retry backoff schedule in minutes for the generic job store. Consumed in
# order; the last value repeats until the per-kind retry ceiling is hit.
retry_backoff_minutes:
  - 10
  - 30
  - 60
  - 180
  - 720

# Lease time-to-live for the distributed lock table (Phase A3). A worker must
# heartbeat within this window or another worker may safely steal the lease.
lock_lease_seconds: 300
lock_heartbeat_seconds: 60

# Publication behaviour (Phase I). `pull_request` opens a PR + CI auto-merge;
# `direct` would commit straight to the branch (not enabled here).
publish_mode: pull_request
auto_publish_confidence: high

# ---- Broadcast discovery (Phase C) ----------------------------------------
# YouTube Data API daily quota ceiling for a single run. The client tracks
# every unit (channels/playlistItems/videos = 1u, search = 100u) and stops
# cleanly with a quota error before exceeding this — it never invents a
# broadcast to fill a gap left by exhausted quota.
youtube_daily_quota: 10000

# MASTER SAFETY SWITCH. When false, high-confidence official broadcasts are
# still DISCOVERED and scored, but they are routed to review instead of being
# auto-linked to a match (no vod_url is written). Keep this false until the
# first real dry-run has been reviewed; flip to true only for supervised
# production linking.
broadcast_auto_link: false

# A candidate at/above this score AND on an official channel is high-confidence
# (auto-linkable when broadcast_auto_link is true). At/above the medium
# threshold it goes to review. Below medium it is not recorded as a candidate.
broadcast_high_score: 90
broadcast_medium_score: 45

# How close (hours) a broadcast's time must be to a match's scheduled time for a
# same-window time signal. A full-day broadcast covering several matches uses
# the wider same-DAY signal instead.
broadcast_time_window_hours: 6

# Max uploads-playlist pages to scan per channel per run (1 unit each). Six
# pages * 50 = up to 300 recent uploads, comfortably covering a rolling window.
broadcast_playlist_pages: 6

# Supported regions (Phase B/C registries are filtered to these).
regions:
  - na
  - emea
  - korea
  - japan
  - pacific
  - china
  - global
